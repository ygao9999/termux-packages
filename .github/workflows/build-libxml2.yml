name: "Build libxml2 (with static .a)"

on:
  workflow_dispatch: {}
  push:
    branches:
      - "**"
    paths:
      - "packages/libxml2/**"
      - ".github/workflows/build-libxml2.yml"

jobs:
  build-libxml2:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h

      # LOCAL PATCH: cache ~/.termux-build across runs. This directory holds
      # the toolchain cache (_cache/) and host-build products (e.g. the
      # python3.14 crossenv build that libxml2 depends on for host tooling).
      # Without this, every single CI run recompiles that host python from
      # scratch, which is where the ~15000 lines of log and most of the
      # build time came from. Cache key is scoped to the package name and
      # a hash of its build.sh, so it invalidates automatically whenever
      # the recipe actually changes, and a "restore-keys" fallback lets a
      # slightly-stale cache still be reused as a warm starting point.
      - name: Cache termux-build host/toolchain artifacts
        uses: actions/cache@v4
        with:
          path: ~/.termux-build
          key: termux-build-libxml2-${{ runner.os }}-${{ hashFiles('packages/libxml2/build.sh') }}
          restore-keys: |
            termux-build-libxml2-${{ runner.os }}-

      - name: Run termux-packages docker build for libxml2
        shell: bash
        run: |
          set -euxo pipefail
          ./scripts/run-docker.sh -d ./build-package.sh -I -C -a aarch64 libxml2

      - name: List produced .deb files
        shell: bash
        run: |
          set -euxo pipefail
          find . -maxdepth 2 -iname "*.deb" -print
          find . -maxdepth 2 -iname "*.deb" -exec sha256sum {} \;

      # LOCAL PATCH: don't assume the .a landed in a separate -static
      # package (it currently doesn't, since we removed the hand-written
      # libxml2-static.subpackage.sh that caused the "Duplicated package"
      # error). Instead scan every produced .deb for lib/libxml2.a and
      # report whichever one actually has it.
      - name: Confirm libxml2.a made it into a produced .deb
        shell: bash
        run: |
          set -euxo pipefail
          FOUND=""
          for deb in $(find . -maxdepth 2 -iname "*.deb"); do
            if dpkg-deb -c "$deb" | grep -q "lib/libxml2\.a$"; then
              echo "libxml2.a found in: $deb"
              FOUND="$deb"
            fi
          done
          if [ -z "$FOUND" ]; then
            echo "ERROR: lib/libxml2.a was not found in any produced .deb" >&2
            exit 1
          fi

      - name: Upload built .deb files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libxml2-debs
          path: |
            ./*.deb
            ./debs/*.deb
          if-no-files-found: warn
