name: Build Redis with static linking

on:
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          path: termux-packages

      - name: Patch Redis build.sh to force static linking
        run: |
          cd termux-packages
          # 修改 termux_step_pre_configure 中的 LDFLAGS
          sed -i '/termux_step_pre_configure()/,/^}/ s/LDFLAGS+=" -landroid-execinfo -landroid-glob"/LDFLAGS+=" -Wl,-Bstatic -landroid-execinfo -landroid-glob -Wl,-Bdynamic"/' packages/redis/build.sh
          # 可选：查看修改结果（调试用）
          cat packages/redis/build.sh | grep -A5 "termux_step_pre_configure"

      - name: Build Redis
        run: |
          cd termux-packages
          ./scripts/run-docker.sh -d ./build-package.sh -a aarch64 -I redis

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: redis-aarch64-static-deb
          path: termux-packages/output/*.deb
