# ============================================================
# GitHub Actions workflow: build postgresql 18.2 (aarch64) for Termux
#
# 仓库前提：
#   - 本仓库是 termux/termux-packages 的 fork
#   - packages/postgresql/build.sh 已改为静态链接版本
#   - packages/libxml2/build.sh 已启用 -static 子包（保留，未来可能需要 rebuild）
#   - packages/postgresql/prebuilt/libxml2-static_*.deb 是预编译好的
#     静态库子包（用户本地 build 出来的，直接 commit 到仓库）
#   - 本文件放在 .github/workflows/build-postgresql.yml
#
# 编译平台：
#   termux 官方编译平台（termux/package-builder Docker 镜像）
#   通过 scripts/run-docker.sh 启动，跟 termux 官方 CI 完全一致
#
# 流程（7 步）：
#   1. checkout fork 仓库（含预编译的 libxml2-static .deb）
#   2. setup docker（run-docker.sh 依赖）
#   3. 缓存 ccache + docker 镜像（加速二次构建）
#   4. 把预编译的 libxml2-static .deb 复制到 output/
#      （termux build-package.sh -i 会自动从 output/ 拉依赖）
#   5. build postgresql → 自动从 output/ 拉 libxml2-static
#   6. 失败时收集 config.log 用于排查
#   7. 验证 + 上传 postgresql deb 作为 artifact
#
# 触发方式：
#   - 手动 dispatch（支持版本号覆盖）
#   - push 到 main/master 且 packages/postgresql/ 有改动
#   - PR 触发
#   - 每周日凌晨 3 点定时
# ============================================================

name: Build postgresql (aarch64)

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL version override (empty = use build.sh default)'
        required: false
        default: ''
  push:
    branches: [main, master]
    paths:
      - 'packages/postgresql/**'
      - '.github/workflows/build-postgresql.yml'
  pull_request:
    paths:
      - 'packages/postgresql/**'
      - '.github/workflows/build-postgresql.yml'
  schedule:
    # 每周日凌晨 3 点 (Asia/Shanghai = UTC 19:00 周六)
    - cron: '0 19 * * 6'

# 防止并发构建互相覆盖 output/
concurrency:
  group: build-postgresql-aarch64
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  TARGET_ARCH: aarch64
  # 预编译 libxml2-static deb 的存放路径（commit 到仓库的）
  PREBUILT_LIBXML2_STATIC: packages/postgresql/prebuilt/libxml2-static_2.15.3-2_aarch64.deb

jobs:
  build:
    name: Build postgresql for aarch64
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ----------------------------------------------------------
      # 1. checkout fork 仓库（含预编译的 libxml2-static .deb）
      # ----------------------------------------------------------
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ----------------------------------------------------------
      # 2. 如果 dispatch 输入了版本号，覆盖 TERMUX_PKG_VERSION
      # ----------------------------------------------------------
      - name: Override PG version (if specified)
        run: |
          if [ -n "${{ github.event.inputs.pg_version }}" ]; then
            sed -i "s|^TERMUX_PKG_VERSION=.*|TERMUX_PKG_VERSION=\"${{ github.event.inputs.pg_version }}\"|" \
              packages/postgresql/build.sh
            sed -i "s|^TERMUX_PKG_SHA256=.*|TERMUX_PKG_SHA256=SKIP_CHECK|" \
              packages/postgresql/build.sh
            echo "⚠️ 已覆盖版本为 ${{ github.event.inputs.pg_version }}，SHA256 跳过校验"
          fi
          
          echo "=== packages/postgresql/build.sh head ==="
          head -20 packages/postgresql/build.sh

      # ----------------------------------------------------------
      # 3. Setup Docker（termux run-docker.sh 依赖）
      # ----------------------------------------------------------
      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      # ----------------------------------------------------------
      # 4. 把预编译的 libxml2-static .deb 复制到 output/
      #    （termux build-package.sh -i 会自动从 output/ 拉依赖）
      #
      #    这样 postgresql 构建时，BUILD_DEPENDS 里的 libxml2-static
      #    会直接从 output/ 找到这个 .deb 并 dpkg -i 进 docker 容器，
      #    不会触发 libxml2 的重新构建。
      # ----------------------------------------------------------
      - name: Stage prebuilt libxml2-static deb
        run: |
          mkdir -p output
          
          if [ ! -f "${{ env.PREBUILT_LIBXML2_STATIC }}" ]; then
            echo "❌ 预编译 libxml2-static deb 不存在：${{ env.PREBUILT_LIBXML2_STATIC }}"
            echo "请将文件 commit 到该路径"
            exit 1
          fi
          
          cp -v "${{ env.PREBUILT_LIBXML2_STATIC }}" output/
          
          echo "=== output/ 目录内容 ==="
          ls -lh output/
          
          echo ""
          echo "=== 验证 deb 内容 ==="
          cd /tmp && rm -rf verify && mkdir verify && cd verify
          ar x $GITHUB_WORKSPACE/output/$(basename ${{ env.PREBUILT_LIBXML2_STATIC }})
          tar -tJvf data.tar.xz | head -10
          
          if ! tar -tJf data.tar.xz | grep -q "libxml2.a"; then
            echo "❌ 预编译 deb 不包含 libxml2.a"
            exit 1
          fi
          echo "✅ libxml2.a found in prebuilt deb"

      # ----------------------------------------------------------
      # 5. Build postgresql
      #
      #    用 -i (小写) 让 termux 自己处理依赖:
      #      1) output/ 目录 → 找到 .deb 直接用
      #      2) termux apt 仓库 → 下载
      #      3) 都没有 → 从源码 build
      #
      #    libxml2-static 官方 apt 没有,output/ 里有我们预编译的 .deb,
      #    termux 会直接用。
      #
      #    python 等其它依赖 termux 会从源码 build,第一次 30+ 分钟,
      #    后续有 output/ cache 会快。这是 termux 官方 CI 的标准做法。
      #
      #    失败时立即把 config.log 复制到挂载的仓库目录,
      #    避免容器退出后 build dir 被销毁、config.log 丢失。
      # ----------------------------------------------------------
      - name: Build postgresql
        run: |
          ./scripts/run-docker.sh bash -c '
            set +e
            
            # 验证 output/ 里有 libxml2-static
            echo "=== output/ 目录内容 ==="
            ls -lh /home/builder/termux-packages/output/ | grep -E "libxml2|total"
            
            # 关键修复：termux -i 只对 DEPENDS 生效，不对 BUILD_DEPENDS 生效
            # libxml2-static 在 BUILD_DEPENDS 里，termux 不会从 output/ 找
            # 直接用 dpkg -i 装到 termux prefix，骗过 termux
            echo ""
            echo "=== Pre-install libxml2-static .deb into termux prefix ==="
            # termux docker 容器里 /data/data/com.termux/files/usr 是 TERMUX_PREFIX
            # 但实际路径是 host 模拟的，需要用 termux 的 dpkg
            # 直接 extract .deb 到 termux prefix
            cd /tmp && rm -rf libxml2-static-extract && mkdir libxml2-static-extract && cd libxml2-static-extract
            ar x /home/builder/termux-packages/output/libxml2-static_2.15.3-2_aarch64.deb
            tar -xJf data.tar.xz
            # 拷贝 libxml2.a 到 termux prefix
            TERMUX_PREFIX=/data/data/com.termux/files/usr
            mkdir -p $TERMUX_PREFIX/lib
            cp -v data/data/com.termux/files/usr/lib/libxml2.a $TERMUX_PREFIX/lib/
            ls -lh $TERMUX_PREFIX/lib/libxml2.a
            
            # 标记 libxml2-static 为已 built，防止 termux 尝试重新 build
            mkdir -p /data/data/.built-packages
            echo "2.15.3-2" > /data/data/.built-packages/libxml2-static
            echo "✅ libxml2-static pre-installed"
            
            cd /home/builder/termux-packages
            ./build-package.sh -i -f -a ${{ env.TARGET_ARCH }} postgresql
            BUILD_EXIT=$?
            if [ $BUILD_EXIT -ne 0 ]; then
              echo ""
              echo "=== Build failed (exit $BUILD_EXIT), capturing config.log ==="
              mkdir -p /home/builder/termux-packages/config-logs
              find /home/builder/.termux-build/postgresql -name "config.log" \
                -exec cp {} /home/builder/termux-packages/config-logs/ \; 2>/dev/null
              
              # 同时把 config.log 的关键部分打印到 Actions 日志里
              for log in /home/builder/.termux-build/postgresql/build/config.log \
                         /home/builder/.termux-build/postgresql/host-build/config.log; do
                if [ -f "$log" ]; then
                  echo ""
                  echo "=== $log (last 100 lines) ==="
                  tail -100 "$log"
                fi
              done
            fi
            exit $BUILD_EXIT
          '

      # ----------------------------------------------------------
      # 7. 上传 config.log（build 失败时辅助排查）
      # ----------------------------------------------------------
      - name: Upload config.log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: config-log-aarch64
          path: config-logs/
          if-no-files-found: warn

      # ----------------------------------------------------------
      # 8. 验证 postgresql deb 产出 + Depends 字段检查
      # ----------------------------------------------------------
      - name: Verify postgresql deb
        run: |
          echo "=== postgresql debs ==="
          ls -lh output/postgresql_*_${{ env.TARGET_ARCH }}.deb
          
          echo ""
          echo "=== postgresql package control info ==="
          cd /tmp && rm -rf verify-pg && mkdir verify-pg && cd verify-pg
          ar x $GITHUB_WORKSPACE/output/postgresql_*_${{ env.TARGET_ARCH }}.deb
          tar -xJf control.tar.xz ./control
          cat control
          
          # 期望 Depends 只含 3 个 libandroid-*（8 个核心库已静态链接）
          if grep -E "Depends.*(openssl|readline|libicu|zlib|libuuid|libxml2|ncurses|libiconv)" control; then
            echo "⚠️ 警告：Depends 中出现了应该静态链接的库"
          else
            echo "✅ Depends 字段干净，所有核心库已静态链接"
          fi

      # ----------------------------------------------------------
      # 9. 上传 postgresql .deb（手机端只需要装这个）
      # ----------------------------------------------------------
      - name: Upload postgresql deb
        uses: actions/upload-artifact@v4
        with:
          name: postgresql_aarch64
          path: |
            output/postgresql_*_${{ env.TARGET_ARCH }}.deb
            output/postgresql-*_all.deb
          if-no-files-found: error
          retention-days: 30
