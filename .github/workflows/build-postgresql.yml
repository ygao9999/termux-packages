# ============================================================
# GitHub Actions workflow: build postgresql 18.2 (aarch64) for Termux
#
# 仓库前提：
#   - 本仓库是 termux/termux-packages 的 fork
#   - packages/postgresql/build.sh 已改为静态链接版本
#   - packages/libxml2/build.sh 已启用 -static 子包（已 commit）
#   - 本文件放在 .github/workflows/build-postgresql.yml
#
# 编译平台：
#   termux 官方编译平台（termux/package-builder Docker 镜像）
#   通过 scripts/run-docker.sh 启动，跟 termux 官方 CI 完全一致
#
# 流程（8 步）：
#   1. checkout fork 仓库
#   2. setup docker（run-docker.sh 依赖）
#   3. 缓存 ccache + docker 镜像（加速二次构建）
#   4. build libxml2 → 产出 libxml2-static_*.deb 到 output/
#   5. 验证 libxml2-static deb 含 libxml2.a
#   6. build postgresql → 自动从 output/ 拉取 libxml2-static
#   7. 失败时收集 config.log 用于排查
#   8. 验证 + 上传 postgresql deb 作为 artifact
#
# 触发方式：
#   - 手动 dispatch（支持版本号覆盖）
#   - push 到 main/master 且 packages/postgresql/ 或 libxml2/ 有改动
#   - PR 触发
#   - 每周日凌晨 3 点定时
# ============================================================

name: Build postgresql (aarch64)

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL version override (empty = use build.sh default)'
        required: false
        default: ''
  push:
    branches: [main, master]
    paths:
      - 'packages/postgresql/**'
      - 'packages/libxml2/**'
      - '.github/workflows/build-postgresql.yml'
  pull_request:
    paths:
      - 'packages/postgresql/**'
      - 'packages/libxml2/**'
      - '.github/workflows/build-postgresql.yml'
  schedule:
    # 每周日凌晨 3 点 (Asia/Shanghai = UTC 19:00 周六)
    - cron: '0 19 * * 6'

# 防止并发构建互相覆盖 output/
concurrency:
  group: build-postgresql-aarch64
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  TARGET_ARCH: aarch64

jobs:
  build:
    name: Build postgresql for aarch64
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ----------------------------------------------------------
      # 1. checkout fork 仓库（含全部 termux-packages 源码 + 我们的修改）
      # ----------------------------------------------------------
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ----------------------------------------------------------
      # 2. 如果 dispatch 输入了版本号，覆盖 TERMUX_PKG_VERSION
      # ----------------------------------------------------------
      - name: Override PG version (if specified)
        run: |
          if [ -n "${{ github.event.inputs.pg_version }}" ]; then
            sed -i "s|^TERMUX_PKG_VERSION=.*|TERMUX_PKG_VERSION=\"${{ github.event.inputs.pg_version }}\"|" \
              packages/postgresql/build.sh
            sed -i "s|^TERMUX_PKG_SHA256=.*|TERMUX_PKG_SHA256=SKIP_CHECK|" \
              packages/postgresql/build.sh
            echo "⚠️ 已覆盖版本为 ${{ github.event.inputs.pg_version }}，SHA256 跳过校验"
          fi

          echo "=== packages/postgresql/build.sh head ==="
          head -20 packages/postgresql/build.sh

          echo ""
          echo "=== packages/libxml2/build.sh (static check) ==="
          grep -E "NO_STATICSPLIT|TERMUX_PKG_VERSION" packages/libxml2/build.sh || true

      # ----------------------------------------------------------
      # 3. Setup Docker（termux run-docker.sh 依赖）
      # ----------------------------------------------------------
      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      # ----------------------------------------------------------
      # 4. 缓存：ccache + termux docker 镜像（加速二次构建）
      # ----------------------------------------------------------
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-aarch64-postgresql-${{ hashFiles('packages/postgresql/build.sh') }}
          restore-keys: |
            ccache-aarch64-postgresql-
            ccache-aarch64-

      - name: Docker image cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image
          key: termux-package-builder-image-v1

      - name: Load cached docker image (if exists)
        run: |
          if [ -f /tmp/docker-image/termux-builder.tar ]; then
            docker load -i /tmp/docker-image/termux-builder.tar
            echo "✅ Loaded cached termux image"
          else
            echo "ℹ️ No cached image, run-docker.sh will pull fresh"
          fi

      # ----------------------------------------------------------
      # 5. Build libxml2（产出 libxml2 + libxml2-static deb 到 output/）
      #    使用 termux 官方编译平台：./scripts/run-docker.sh
      # ----------------------------------------------------------
      - name: Build libxml2 (creates libxml2-static subpackage)
        run: |
          # -i: install dependencies from local output/ or apt
          # -f: force rebuild even if deb exists in output/
          # -a: target architecture
          ./scripts/run-docker.sh ./build-package.sh -i -f -a ${{ env.TARGET_ARCH }} libxml2

          echo "=== libxml2 debs in output/ ==="
          ls -lh output/libxml2*_${{ env.TARGET_ARCH }}.deb

      # ----------------------------------------------------------
      # 6. 验证 libxml2-static deb 确实产出且含 libxml2.a
      # ----------------------------------------------------------
      - name: Verify libxml2-static deb
        run: |
          if ! ls output/libxml2-static_*_${{ env.TARGET_ARCH }}.deb 2>/dev/null; then
            echo "❌ libxml2-static_*.deb 未生成"
            echo "请检查 packages/libxml2/build.sh 是否含 TERMUX_PKG_NO_STATICSPLIT=false"
            exit 1
          fi

          echo "=== libxml2-static 内容验证 ==="
          cd /tmp && rm -rf verify && mkdir verify && cd verify
          ar x $GITHUB_WORKSPACE/output/libxml2-static_*_${{ env.TARGET_ARCH }}.deb
          tar -tJvf data.tar.xz | head -20

          if ! tar -tJf data.tar.xz | grep -q "libxml2.a"; then
            echo "❌ libxml2-static 不包含 libxml2.a"
            exit 1
          fi
          echo "✅ libxml2.a found in static subpackage"

      # ----------------------------------------------------------
      # 7. Build postgresql（自动从 output/ 拉取 libxml2-static）
      # ----------------------------------------------------------
      - name: Build postgresql
        run: |
          ./scripts/run-docker.sh ./build-package.sh -i -f -a ${{ env.TARGET_ARCH }} postgresql

      # ----------------------------------------------------------
      # 8. configure 失败时收集 config.log 用于排查
      # ----------------------------------------------------------
      - name: Collect config.log on failure
        if: failure()
        run: |
          mkdir -p config-logs
          # termux build dir 在 docker 容器内的 /home/builder/.termux-build/
          docker run --rm \
            -v "$(pwd):/home/builder/termux-packages" \
            termux/package-builder:latest \
            bash -c 'find /home/builder/.termux-build/postgresql -name "config.log" -exec cp {} /home/builder/termux-packages/config-logs/ \; 2>/dev/null || true'
          ls -la config-logs/ || echo "No config.log found"

      - name: Upload config.log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: config-log-aarch64
          path: config-logs/
          if-no-files-found: ignore

      # ----------------------------------------------------------
      # 9. 验证 postgresql deb 产出 + Depends 字段检查
      # ----------------------------------------------------------
      - name: Verify postgresql deb
        run: |
          echo "=== postgresql debs ==="
          ls -lh output/postgresql_*_${{ env.TARGET_ARCH }}.deb

          echo ""
          echo "=== postgresql package control info ==="
          cd /tmp && rm -rf verify-pg && mkdir verify-pg && cd verify-pg
          ar x $GITHUB_WORKSPACE/output/postgresql_*_${{ env.TARGET_ARCH }}.deb
          tar -xJf control.tar.xz ./control
          cat control

          # 期望 Depends 只含 3 个 libandroid-*（8 个核心库已静态链接）
          if grep -E "Depends.*(openssl|readline|libicu|zlib|libuuid|libxml2|ncurses|libiconv)" control; then
            echo "⚠️ 警告：Depends 中出现了应该静态链接的库"
          else
            echo "✅ Depends 字段干净，所有核心库已静态链接"
          fi

      # ----------------------------------------------------------
      # 10. 上传 postgresql .deb（手机端只需要装这个）
      # ----------------------------------------------------------
      - name: Upload postgresql deb
        uses: actions/upload-artifact@v4
        with:
          name: postgresql_aarch64
          path: |
            output/postgresql_*_${{ env.TARGET_ARCH }}.deb
            output/postgresql-*_all.deb
          if-no-files-found: error
          retention-days: 30

      # ----------------------------------------------------------
      # 11. 上传 libxml2-static .deb（仅复用构建 / debug 用，
      #     手机端安装 postgresql 时不需要装这个 —— libxml2.a