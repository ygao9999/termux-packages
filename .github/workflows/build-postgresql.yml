name: Build PostgreSQL static (partial)

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 直接使用已存在的 packages/postgresql/build.sh，无需复制
      - name: Build PostgreSQL
        run: |
          ./scripts/run-docker.sh -d ./build-package.sh -a aarch64 -I postgresql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-aarch64-deb
          path: output/*.deb
