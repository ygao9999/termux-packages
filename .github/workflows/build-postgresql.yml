name: "Build postgresql (static libs, aarch64)"

on:
  workflow_dispatch: {}
  push:
    branches:
      - "**"
    paths:
      - "packages/postgresql/**"
      - "packages/libxml2/**"
      - ".github/workflows/build-postgresql.yml"

jobs:
  build-postgresql:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h

      # libxml2-static isn't an official Termux package (see packages/libxml2
      # build.sh: we patched default_library=both there). postgresql depends
      # on it via TERMUX_PKG_BUILD_DEPENDS, so it must be built first in the
      # same run and be available for build-package.sh to pick up locally.
      - name: Build libxml2 (provides libxml2-static, a postgresql build-dep)
        shell: bash
        run: |
          set -euxo pipefail
          ./scripts/run-docker.sh -d ./build-package.sh -I -C -a aarch64 libxml2

      - name: List libxml2 output so far
        shell: bash
        run: |
          set -euxo pipefail
          find ./output -iname "*.deb" -print

      # CONFIRMED (not a guess): -i/-I only applies to TERMUX_PKG_DEPENDS
      # (runtime deps). flex is one of postgresql's TERMUX_PKG_BUILD_DEPENDS
      # (build-time only), and those are always compiled locally regardless
      # of -i/-I -- this was verified by removing a standalone "build flex"
      # step and observing flex still got compiled from source as part of
      # postgresql's own build. So this patch is necessary, not optional.
      #
      # flex fails to compile in this environment: its bundled gnulib
      # malloc.c compatibility shim declares `void *malloc();` (old K&R
      # style, no prototype) which conflicts with the compiler's builtin
      # malloc() declaration on newer gcc/clang, turning what used to be a
      # warning into a hard error ("too many arguments to function malloc").
      # This is a known upstream/gnulib issue unrelated to our postgresql
      # changes. It happens during flex's *host* build stage
      # (TERMUX_PKG_HOSTBUILD=true; visible as `stage1flex-malloc.o` in the
      # log), which is compiled with plain `gcc`, not the aarch64 cross
      # compiler, and is configured via $TERMUX_PKG_EXTRA_HOSTBUILD_CONFIGURE_ARGS
      # rather than the target-stage termux_step_pre_configure hook.
      #
      # flex's build.sh invokes configure with an *unquoted* expansion of
      # that variable, so bash word-splits it on whitespace into separate
      # configure arguments. A single whitespace-free "CFLAGS=..." token is
      # treated as one VAR=value assignment; anything with an embedded
      # space splits into extra tokens that configure doesn't recognize as
      # flags of its own and rejects with "unrecognized option" (verified
      # locally against a real autoconf-generated configure script before
      # settling on this fix). We therefore replace the existing
      # CFLAGS=-D_GNU_SOURCE=1 (an old Ubuntu 17.10-specific workaround,
      # irrelevant on the ubuntu-24.04 runner used here) with our own single
      # flag rather than trying to append to it.
      - name: Patch flex build.sh to work around gnulib malloc.c compile error (host build stage)
        shell: bash
        run: |
          set -euxo pipefail
          FLEX_BUILD_SH="packages/flex/build.sh"
          if [ ! -f "$FLEX_BUILD_SH" ]; then
            echo "ERROR: $FLEX_BUILD_SH not found" >&2
            exit 1
          fi
          echo "=== Before patch ==="
          grep -n "TERMUX_PKG_EXTRA_HOSTBUILD_CONFIGURE_ARGS" "$FLEX_BUILD_SH"
          sed -i \
            's/TERMUX_PKG_EXTRA_HOSTBUILD_CONFIGURE_ARGS="CFLAGS=-D_GNU_SOURCE=1"/TERMUX_PKG_EXTRA_HOSTBUILD_CONFIGURE_ARGS="CFLAGS=-Wno-error=builtin-declaration-mismatch"/' \
            "$FLEX_BUILD_SH"
          echo "=== After patch ==="
          grep -n "TERMUX_PKG_EXTRA_HOSTBUILD_CONFIGURE_ARGS" "$FLEX_BUILD_SH"
          if ! grep -q "builtin-declaration-mismatch" "$FLEX_BUILD_SH"; then
            echo "ERROR: sed did not find the expected line to patch. flex/build.sh may have changed upstream." >&2
            exit 1
          fi

      - name: Build postgresql (partial static link against 8 static libs)
        shell: bash
        run: |
          set -euxo pipefail
          ./scripts/run-docker.sh -d ./build-package.sh -I -C -a aarch64 postgresql

      - name: List produced .deb files
        shell: bash
        run: |
          set -euxo pipefail
          find ./output -iname "*.deb" -print
          find ./output -iname "*.deb" -exec sha256sum {} \;

      # Sanity-check that postgresql's runtime Depends field is clean: the 8
      # libs we statically linked must NOT show up there, otherwise the
      # partial-static-link step silently fell back to dynamic linking
      # somewhere and installing postgresql.deb alone (without those -static
      # packages) would break on a device that doesn't have them.
      - name: Inspect postgresql package dependencies
        shell: bash
        run: |
          set -euxo pipefail
          DEB=$(find ./output -iname "postgresql_*_aarch64.deb" | head -1)
          if [ -z "$DEB" ]; then
            echo "ERROR: no postgresql_*.deb produced" >&2
            exit 1
          fi
          echo "Found: $DEB"
          dpkg-deb -f "$DEB" Depends
          echo "--- checking that statically-linked libs are absent from Depends ---"
          if dpkg-deb -f "$DEB" Depends | grep -Ei "openssl|readline|libicu|zlib|uuid|libxml2|ncurses|libiconv"; then
            echo "WARNING: a supposedly-static lib appears in runtime Depends; partial static link may not have applied as expected." >&2
          else
            echo "OK: runtime Depends is clean of the 8 statically-linked libs."
          fi

      - name: Upload built .deb files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-debs
          path: ./output/*.deb
          if-no-files-found: warn