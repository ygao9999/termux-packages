name: Build PostgreSQL static (partial)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare package definition
        run: |
          mkdir -p packages/postgresql
          cp build.sh packages/postgresql/build.sh

      - name: Build PostgreSQL
        run: |
          ./scripts/run-docker.sh -d ./build-package.sh -a aarch64 -I postgresql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-aarch64-deb
          path: output/*.deb
